# Docker JSON log format — parses the outer Docker wrapper
[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

# JSON parser for structured app logs (lograge, semantic_logger, etc.)
# Applied as a second pass to the inner `log` field
[PARSER]
    Name        json
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On
