[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     warn
    Parsers_File  /fluent-bit/etc/parsers.conf

# ---------------------------------------------------------------------------
# Input — tail all Docker container log files from the host
# ---------------------------------------------------------------------------
[INPUT]
    Name              tail
    Tag               docker.<container_name>
    Path              /var/lib/docker/containers/*/*.log
    Path_Key          filename
    Parser            docker
    DB                /var/log/flb_docker.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    Refresh_Interval  10
    Docker_Mode       On

# ---------------------------------------------------------------------------
# Filter — lift nested JSON log field (if app emits JSON to stdout)
# ---------------------------------------------------------------------------
[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       json
    Reserve_Data On
    Preserve_Key On

# ---------------------------------------------------------------------------
# Filter — map container_name to service.name for SigNoz service attribution
# ---------------------------------------------------------------------------
[FILTER]
    Name    modify
    Match   docker.*
    Copy    container_name service.name

# ---------------------------------------------------------------------------
# Output — send to SigNoz OTel collector via OTLP HTTP
# ---------------------------------------------------------------------------
[OUTPUT]
    Name                 opentelemetry
    Match                docker.*
    Host                 signoz-otel-collector
    Port                 4318
    Logs_uri             /v1/logs
    Log_response_payload True
    Tls                  Off
    Tls.verify           Off
