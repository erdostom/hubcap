[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     warn
    Parsers_File  /fluent-bit/etc/parsers.conf

# ---------------------------------------------------------------------------
# Input — tail all Docker container log files from the host
# ---------------------------------------------------------------------------
[INPUT]
    Name              tail
    Tag               docker.<container_id>
    Path              /var/lib/docker/containers/*/*.log
    Path_Key          filename
    Parser            docker
    DB                /var/log/flb_docker.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    Refresh_Interval  10
    Docker_Mode       On
    Tag_Regex         (?<container_id>[a-f0-9]{64})-json\.log$

# ---------------------------------------------------------------------------
# Filter — lift nested JSON log field (if app emits JSON to stdout)
# ---------------------------------------------------------------------------
[FILTER]
    Name         parser
    Match        docker.*
    Key_Name     log
    Parser       json
    Reserve_Data On
    Preserve_Key On

# ---------------------------------------------------------------------------
# Filter — set service_name and hostname for SigNoz attribution
# ---------------------------------------------------------------------------
[FILTER]
    Name   lua
    Match  docker.*
    Script /fluent-bit/etc/service-name.lua
    Call   set_service_name

# ---------------------------------------------------------------------------
# Output — send to SigNoz OTel collector via OTLP HTTP
# ---------------------------------------------------------------------------
[OUTPUT]
    Name                 opentelemetry
    Match                docker.*
    Host                 otel.example.com
    Port                 443
    Logs_uri             /v1/logs
    Log_response_payload True
    Tls                  On
    Tls.verify           On
    Logs_body_key        log
