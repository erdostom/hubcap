global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  # Prometheus monitors itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # -------------------------------------------------------------------------
  # Rails applications — add one job per app
  # -------------------------------------------------------------------------
  # Example: uncomment and duplicate for each Rails app you want to monitor
  #
  # - job_name: "my-rails-app"
  #   metrics_path: "/metrics"
  #   basic_auth:
  #     username: "prometheus"
  #     password: "change-me"
  #   static_configs:
  #     - targets: ["my-rails-app.example.com:3000"]
  #       labels:
  #         app: "my-rails-app"
  #         environment: "production"
