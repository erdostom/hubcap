services:
  # ---------------------------------------------------------------------------
  # Reverse proxy — TLS termination + routing by subdomain
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: hubcap-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      SIGNOZ_DOMAIN: ${SIGNOZ_DOMAIN:?Set SIGNOZ_DOMAIN in .env}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:?Set GLITCHTIP_DOMAIN in .env}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - signoz
      - glitchtip-web
    networks:
      - hubcap

  # ---------------------------------------------------------------------------
  # APM + metrics + logs — SigNoz (ClickHouse-backed)
  # ---------------------------------------------------------------------------
  signoz-init-clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    container_name: hubcap-signoz-init-clickhouse
    restart: on-failure
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-quantile for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    volumes:
      - signoz_clickhouse_user_scripts:/var/lib/clickhouse/user_scripts/
    networks:
      - hubcap

  signoz-zookeeper:
    image: signoz/zookeeper:3.7.1
    container_name: hubcap-signoz-zookeeper
    restart: unless-stopped
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141
    healthcheck:
      test:
        - CMD-SHELL
        - curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - signoz_zookeeper:/bitnami/zookeeper
    networks:
      - hubcap

  signoz-clickhouse:
    image: clickhouse/clickhouse-server:25.5.6
    container_name: hubcap-signoz-clickhouse
    restart: unless-stopped
    tty: true
    depends_on:
      signoz-init-clickhouse:
        condition: service_completed_successfully
      signoz-zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping"]
      interval: 30s
      timeout: 5s
      retries: 3
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./signoz/clickhouse/config.xml:/etc/clickhouse-server/config.xml:ro
      - ./signoz/clickhouse/users.xml:/etc/clickhouse-server/users.xml:ro
      - ./signoz/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml:ro
      - ./signoz/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - signoz_clickhouse_user_scripts:/var/lib/clickhouse/user_scripts/
      - signoz_clickhouse:/var/lib/clickhouse/
    networks:
      - hubcap

  signoz-telemetrystore-migrator:
    image: signoz/signoz-otel-collector:v0.144.3
    container_name: hubcap-signoz-telemetrystore-migrator
    restart: on-failure
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://signoz-clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
    networks:
      - hubcap

  signoz:
    image: signoz/signoz:v0.120.0
    container_name: hubcap-signoz
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"   # UI — only accessible via Caddy reverse proxy
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://signoz-clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=${SIGNOZ_JWT_SECRET:?Set SIGNOZ_JWT_SECRET in .env}
    volumes:
      - signoz_sqlite:/var/lib/signoz/
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
    networks:
      - hubcap

  signoz-otel-collector:
    image: signoz/signoz-otel-collector:v0.144.3
    container_name: hubcap-signoz-otel-collector
    restart: unless-stopped
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/manager-config.yaml --copy-path=/var/tmp/collector-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=hubcap,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://signoz-clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    ports:
      - "4317:4317"   # OTLP gRPC — Rails apps send traces/metrics/logs here
      - "4318:4318"   # OTLP HTTP — alternative for apps that prefer HTTP
    volumes:
      - ./signoz/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - ./signoz/otel-collector-opamp-config.yaml:/etc/manager-config.yaml:ro
    depends_on:
      signoz-clickhouse:
        condition: service_healthy
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
    networks:
      - hubcap

  # ---------------------------------------------------------------------------
  # Log shipping — FluentBit tails all Docker container stdout → SigNoz
  # ---------------------------------------------------------------------------
  fluent-bit:
    image: fluent/fluent-bit:3
    container_name: hubcap-fluent-bit
    restart: unless-stopped
    volumes:
      - ./signoz/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./signoz/fluent-bit-parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - fluent_bit_db:/var/log/
    depends_on:
      - signoz-otel-collector
    networks:
      - hubcap

  # ---------------------------------------------------------------------------
  # Exception tracking — GlitchTip
  # ---------------------------------------------------------------------------
  glitchtip-migrate:
    image: glitchtip/glitchtip:6
    container_name: hubcap-glitchtip-migrate
    restart: "no"
    command: ./manage.py migrate --noinput
    environment:
      DATABASE_URL: postgres://${GLITCHTIP_DB_USER:-glitchtip}:${GLITCHTIP_DB_PASSWORD:?Set GLITCHTIP_DB_PASSWORD in .env}@glitchtip-db:5432/${GLITCHTIP_DB_NAME:-glitchtip}
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?Set GLITCHTIP_SECRET_KEY in .env}
    depends_on:
      glitchtip-db:
        condition: service_healthy
    networks:
      - hubcap

  glitchtip-web:
    image: glitchtip/glitchtip:6
    container_name: hubcap-glitchtip-web
    restart: unless-stopped
    command: >
      uwsgi
        --module=glitchtip.wsgi:application
        --env DJANGO_SETTINGS_MODULE=glitchtip.settings
        --master --pidfile=/tmp/project-master.pid
        --log-x-forwarded-for --log-format-strftime
        --http-socket=:8080
        --workers=2
        --cheaper=1
        --cheaper-algo=busyness
        --cheaper-overload=30
        --cheaper-step=1
        --cheaper-busyness-max=50
        --cheaper-busyness-min=25
        --cheaper-busyness-multiplier=20
        --harakiri=120
        --max-requests=10000
        --worker-reload-mercy=10
        --die-on-term
        --enable-threads
        --single-interpreter
        --post-buffering
        --buffer-size=83146
        --ignore-sigpipe
        --ignore-write-errors
        --disable-write-exception
        --listen=128
    environment:
      DATABASE_URL: postgres://${GLITCHTIP_DB_USER:-glitchtip}:${GLITCHTIP_DB_PASSWORD:?Set GLITCHTIP_DB_PASSWORD in .env}@glitchtip-db:5432/${GLITCHTIP_DB_NAME:-glitchtip}
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?Set GLITCHTIP_SECRET_KEY in .env}
      GLITCHTIP_DOMAIN: https://${GLITCHTIP_DOMAIN}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL:-noreply@example.com}
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
      REDIS_URL: redis://glitchtip-redis:6379/0
      CELERY_WORKER_AUTOSCALE: "1,3"
      ENABLE_ORGANIZATION_CREATION: ${GLITCHTIP_ENABLE_ORG_CREATION:-false}
      ENABLE_USER_REGISTRATION: ${GLITCHTIP_ENABLE_REGISTRATION:-false}
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-migrate:
        condition: service_completed_successfully
      glitchtip-redis:
        condition: service_started
    networks:
      - hubcap

  glitchtip-worker:
    image: glitchtip/glitchtip:6
    container_name: hubcap-glitchtip-worker
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgres://${GLITCHTIP_DB_USER:-glitchtip}:${GLITCHTIP_DB_PASSWORD:?Set GLITCHTIP_DB_PASSWORD in .env}@glitchtip-db:5432/${GLITCHTIP_DB_NAME:-glitchtip}
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?Set GLITCHTIP_SECRET_KEY in .env}
      GLITCHTIP_DOMAIN: https://${GLITCHTIP_DOMAIN}
      REDIS_URL: redis://glitchtip-redis:6379/0
      CELERY_WORKER_AUTOSCALE: "1,3"
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-migrate:
        condition: service_completed_successfully
      glitchtip-redis:
        condition: service_started
    networks:
      - hubcap

  glitchtip-db:
    image: postgres:16-alpine
    container_name: hubcap-glitchtip-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${GLITCHTIP_DB_USER:-glitchtip}
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD:?Set GLITCHTIP_DB_PASSWORD in .env}
      POSTGRES_DB: ${GLITCHTIP_DB_NAME:-glitchtip}
    volumes:
      - glitchtip_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GLITCHTIP_DB_USER:-glitchtip}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hubcap

  glitchtip-redis:
    image: redis:7-alpine
    container_name: hubcap-glitchtip-redis
    restart: unless-stopped
    networks:
      - hubcap

volumes:
  caddy_data:
  caddy_config:
  signoz_clickhouse:
  signoz_clickhouse_user_scripts:
  signoz_zookeeper:
  signoz_sqlite:
  fluent_bit_db:
  glitchtip_db_data:

networks:
  hubcap:
    driver: bridge
