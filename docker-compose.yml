services:
  # ---------------------------------------------------------------------------
  # Reverse proxy — TLS termination + routing by subdomain
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    container_name: hubcap-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      GRAFANA_DOMAIN: ${GRAFANA_DOMAIN:?Set GRAFANA_DOMAIN in .env}
      GLITCHTIP_DOMAIN: ${GLITCHTIP_DOMAIN:?Set GLITCHTIP_DOMAIN in .env}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - grafana
      - glitchtip-web
    networks:
      - hubcap

  # ---------------------------------------------------------------------------
  # Metrics
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: hubcap-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alerting/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    networks:
      - hubcap

  grafana:
    image: grafana/grafana:11.1.0
    container_name: hubcap-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD in .env}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: https://${GRAFANA_DOMAIN}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - hubcap

  # ---------------------------------------------------------------------------
  # Log aggregation
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.1.0
    container_name: hubcap-loki
    restart: unless-stopped
    volumes:
      - ./loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - hubcap

  promtail:
    image: grafana/promtail:3.1.0
    container_name: hubcap-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - hubcap

  # ---------------------------------------------------------------------------
  # Exception tracking — GlitchTip
  # ---------------------------------------------------------------------------
  glitchtip-migrate:
    image: glitchtip/glitchtip:v4.0
    container_name: hubcap-glitchtip-migrate
    restart: "no"
    command: ./manage.py migrate --noinput
    environment:
      DATABASE_URL: postgres://${GLITCHTIP_DB_USER:-glitchtip}:${GLITCHTIP_DB_PASSWORD:?Set GLITCHTIP_DB_PASSWORD in .env}@glitchtip-db:5432/${GLITCHTIP_DB_NAME:-glitchtip}
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?Set GLITCHTIP_SECRET_KEY in .env}
    depends_on:
      glitchtip-db:
        condition: service_healthy
    networks:
      - hubcap

  glitchtip-web:
    image: glitchtip/glitchtip:v4.0
    container_name: hubcap-glitchtip-web
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${GLITCHTIP_DB_USER:-glitchtip}:${GLITCHTIP_DB_PASSWORD:?Set GLITCHTIP_DB_PASSWORD in .env}@glitchtip-db:5432/${GLITCHTIP_DB_NAME:-glitchtip}
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?Set GLITCHTIP_SECRET_KEY in .env}
      GLITCHTIP_DOMAIN: https://${GLITCHTIP_DOMAIN}
      DEFAULT_FROM_EMAIL: ${GLITCHTIP_FROM_EMAIL:-noreply@example.com}
      EMAIL_URL: ${GLITCHTIP_EMAIL_URL:-consolemail://}
      REDIS_URL: redis://glitchtip-redis:6379/0
      CELERY_WORKER_AUTOSCALE: "1,3"
      ENABLE_ORGANIZATION_CREATION: ${GLITCHTIP_ENABLE_ORG_CREATION:-false}
      ENABLE_USER_REGISTRATION: ${GLITCHTIP_ENABLE_REGISTRATION:-false}
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-migrate:
        condition: service_completed_successfully
      glitchtip-redis:
        condition: service_started
    networks:
      - hubcap

  glitchtip-worker:
    image: glitchtip/glitchtip:v4.0
    container_name: hubcap-glitchtip-worker
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment:
      DATABASE_URL: postgres://${GLITCHTIP_DB_USER:-glitchtip}:${GLITCHTIP_DB_PASSWORD:?Set GLITCHTIP_DB_PASSWORD in .env}@glitchtip-db:5432/${GLITCHTIP_DB_NAME:-glitchtip}
      SECRET_KEY: ${GLITCHTIP_SECRET_KEY:?Set GLITCHTIP_SECRET_KEY in .env}
      GLITCHTIP_DOMAIN: https://${GLITCHTIP_DOMAIN}
      REDIS_URL: redis://glitchtip-redis:6379/0
      CELERY_WORKER_AUTOSCALE: "1,3"
    depends_on:
      glitchtip-db:
        condition: service_healthy
      glitchtip-migrate:
        condition: service_completed_successfully
      glitchtip-redis:
        condition: service_started
    networks:
      - hubcap

  glitchtip-db:
    image: postgres:16-alpine
    container_name: hubcap-glitchtip-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${GLITCHTIP_DB_USER:-glitchtip}
      POSTGRES_PASSWORD: ${GLITCHTIP_DB_PASSWORD:?Set GLITCHTIP_DB_PASSWORD in .env}
      POSTGRES_DB: ${GLITCHTIP_DB_NAME:-glitchtip}
    volumes:
      - glitchtip_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GLITCHTIP_DB_USER:-glitchtip}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hubcap

  glitchtip-redis:
    image: redis:7-alpine
    container_name: hubcap-glitchtip-redis
    restart: unless-stopped
    networks:
      - hubcap

volumes:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
  loki_data:
  glitchtip_db_data:

networks:
  hubcap:
    driver: bridge
