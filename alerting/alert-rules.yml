groups:
  - name: rails_alerts
    rules:
      # High error rate — more than 5% of requests returning 5xx over 5 minutes
      - alert: HighErrorRate
        expr: |
          (
            sum by (app) (rate(rails_requests_total{status=~"5.."}[5m]))
            /
            sum by (app) (rate(rails_requests_total[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High 5xx error rate on {{ $labels.app }}"
          description: "{{ $labels.app }} is returning 5xx errors on {{ $value | humanizePercentage }} of requests."

      # Slow response times — p95 latency above 1 second
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, sum by (app, le) (rate(rails_request_duration_seconds_bucket[5m]))) > 1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High p95 latency on {{ $labels.app }}"
          description: "{{ $labels.app }} p95 response time is {{ $value | humanizeDuration }}."

  - name: sidekiq_alerts
    rules:
      # Sidekiq queue latency — jobs waiting more than 60 seconds
      - alert: SidekiqHighQueueLatency
        expr: |
          sidekiq_queue_latency_seconds > 60
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Sidekiq queue latency is high on {{ $labels.app }}"
          description: "Queue {{ $labels.queue }} on {{ $labels.app }} has {{ $value | humanizeDuration }} latency."

      # Sidekiq failed jobs spike
      - alert: SidekiqHighFailureRate
        expr: |
          rate(sidekiq_jobs_failed_total[5m]) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Sidekiq failure rate is high on {{ $labels.app }}"
          description: "{{ $labels.app }} is failing {{ $value }} jobs/sec."

  - name: infrastructure_alerts
    rules:
      # Prometheus target down
      - alert: TargetDown
        expr: up == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Scrape target {{ $labels.instance }} is down"
          description: "Prometheus cannot reach {{ $labels.job }} at {{ $labels.instance }}."
